SECTIONS [
    STARTUP: start = 0x0000;
    BIOS_MAIN: target = ROM, mode = page_fit;
    BIOS_DDI: target = ROM, mode = page_fit_labels;
    BIOS_IO: target = ROM, mode = page_fit;
    IO_UTILS: target = ROM, mode = page_fit;
    BIOS_TTYE: target = ROM, mode = page_fit;
    BIOS_UTILS: target = ROM, mode = page_fit;
    BIOS_BOOT: target = ROM, mode = page_fit;
    BIOS_INT: target = ROM, start = 0x1F00;
    MEMUTILS: target = ROM, mode = page_fit;
    ROM_SIGNATURE: target = ROM, start = 0x1FF0;
    NUMUTILS: target = ROM, mode = page_fit;
    BIOS_CONST: multi, mode = page_fit_labels, target = ROM;
    BIOS_DDI_DNAMES: target = ROM, mode = page_align;

    BIOS_DATA: start = 0x2000, multi;
    BIOS_STACK: start = 0x2100;
    BIOS_DTABLE: start = 0x2200;
    BIOS_TEXT_INBUF: start = 0x2300;

    LNCDPAGE: target = RAM, mode = page_align;
]